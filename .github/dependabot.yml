# Docs: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2
updates:
  - package-ecosystem: "npm"
    directories: ["/website"]
    schedule:
      interval: "quarterly"
    cooldown:
      default-days: 2
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']

  - package-ecosystem: "npm"
    directories: ["/scripts"]
    schedule:
      interval: "quarterly"
    cooldown:
      default-days: 2
    ignore:
      # Ignore packages which are very outdated and need to be updated manually.
      - dependency-name: "puppeteer"
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
